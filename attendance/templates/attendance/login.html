<!DOCTYPE html>
<html>
<head>
    <title>Login - Face Attendance System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .tab-container {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        /* Remove autofill background color */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #555 !important;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        .message {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .student-fields, .admin-fields {
            display: none;
        }
        .student-fields.active, .admin-fields.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🎓 Face Attendance System</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <!-- Login Tabs -->
        <div class="tab-container">
            <div class="tab active" onclick="showTab('student')" id="tab-student">👨‍🎓 Student</div>
            <div class="tab" onclick="showTab('admin')" id="tab-admin">👤 Admin</div>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="user_type" id="user_type" value="student">
            
            <!-- Student Fields -->
            <div id="student-fields" class="student-fields active">
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" name="username" placeholder="Enter Student ID" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter Email" autocomplete="off" required>
                </div>
            </div>
            
            <!-- Admin Fields - No values -->
            <div id="admin-fields" class="admin-fields">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter Username" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter Password" autocomplete="off" required>
                </div>
            </div>
            
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        function showTab(type) {
            // Update tabs
            document.getElementById('tab-student').classList.remove('active');
            document.getElementById('tab-admin').classList.remove('active');
            document.getElementById('tab-' + type).classList.add('active');
            
            // Update fields
            document.getElementById('student-fields').classList.remove('active');
            document.getElementById('admin-fields').classList.remove('active');
            document.getElementById(type + '-fields').classList.add('active');
            
            // Update hidden input
            document.getElementById('user_type').value = type;
            
            // Clear any auto-filled values when switching tabs
            if (type === 'admin') {
                document.querySelector('#admin-fields input[name="username"]').value = '';
                document.querySelector('#admin-fields input[name="password"]').value = '';
            } else {
                document.querySelector('#student-fields input[name="username"]').value = '';
                document.querySelector('#student-fields input[name="email"]').value = '';
            }
        }
    </script>
</body>
</html>
